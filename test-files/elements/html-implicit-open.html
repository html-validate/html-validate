<!-- head implicitly opened when meta content appears -->
<html lang="en">
	<title>foo</title>
	<body></body>
</html>

<!-- body implicitly opened when flow content appears -->
<html lang="en">
	<head>
		<title>foo</title>
	</head>
	<p>lorem ipsum</p>
</html>

<!-- both head and body implicitly opened -->
<html lang="en">
	<title>foo</title>
	<p>lorem ipsum</p>
</html>
